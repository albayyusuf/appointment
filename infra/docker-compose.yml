services:
  postgres:
    image: postgres:16-alpine
    container_name: appointment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: appointment
      POSTGRES_PASSWORD: appointment
      POSTGRES_DB: appointment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
